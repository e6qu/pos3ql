# pos3ql development configuration.
# Every limit is fixed at startup; the server reserves exactly the memory
# this file implies and never allocates beyond it. Sizes accept KiB/MiB/GiB.

listen_addr = 127.0.0.1:5433
data_dir = ./data

max_connections = 64
conn_recv_buffer_bytes = 64KiB   # bounds the largest inbound wire message
conn_send_buffer_bytes = 64KiB
sql_arena_bytes = 256KiB         # per-statement parse/plan arena, per connection

# Object storage: the durable home of the database. A node with a wiped
# disk cold-starts entirely from the bucket. `docker run minio/minio` and
# create the bucket first, or set s3 = off for a purely local database.
# With s3 on, commits are durable in the bucket before they acknowledge
# (wal_upload / wal_upload_sync default on); set wal_upload_sync = off to
# trade that for local-fsync commit latency with an asynchronous drain.
s3 = on
s3_endpoint = 127.0.0.1:19100
s3_bucket = pos3ql
s3_prefix = dev/
s3_access_key = minioadmin
s3_secret_key = minioadmin

memtable_bytes = 64MiB           # LSM write buffer before flush to object storage
wal_bytes = 64MiB                # preallocated journal file (disk)
wal_buffer_bytes = 1MiB          # WAL staging buffer (bounds largest record)
max_tables = 32
table_rows = 8192                # per-table rows resident in the memtable
block_cache_bytes = 128MiB       # RAM cache of object-storage blocks
disk_cache_bytes = 1GiB          # local disk cache of object-storage objects
