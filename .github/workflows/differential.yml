name: Differential

# Runs the SQL corpora and the generative fuzzer against a REAL PostgreSQL 18
# and against pos3ql, and diffs them. This is the coverage that the fast
# unit-test CI (ci.yml) cannot give: tens of thousands of vendored
# sqllogictest blocks plus thousands of generated statements, all validated
# against PostgreSQL as the oracle.
#
# Sharded so every job fits the 15-minute cap while total coverage is
# preserved: three shards each replay a third of the vendored sqllogictest
# corpus, and a fourth shard runs the full generative fuzzer. Every shard also
# runs the fast gates (wire probe, psycopg driver, curated SQL corpus).

on:
  push:
    branches: [main]
  pull_request:

# One run per ref: a new push cancels the previous, still-running run, and a
# feature branch runs once (via pull_request) instead of twice.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  differential:
    name: differential (${{ matrix.shard }})
    runs-on: ubuntu-latest
    # Hard ceiling on every CI job: 15 minutes. Each shard runs at most a third
    # of the sqllogictest corpus or the fuzzer alone, so all finish well under
    # this cap; the cap still guarantees a pathological query can never wedge CI.
    timeout-minutes: 15

    strategy:
      # Report every shard's result rather than cancelling siblings on the
      # first failure — a divergence in one shard should not hide others.
      fail-fast: false
      matrix:
        include:
          - shard: slt-1
            run_slt: "1"
            slt_index: "1"
            run_fuzz: "0"
          - shard: slt-2
            run_slt: "1"
            slt_index: "2"
            run_fuzz: "0"
          - shard: slt-3
            run_slt: "1"
            slt_index: "3"
            run_fuzz: "0"
          - shard: fuzz
            run_slt: "0"
            slt_index: "1"
            run_fuzz: "1"

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          # Match pos3ql: C/byte collation so ordering/min/max agree, and UTF8
          # server encoding (vanilla PostgreSQL's real-world default, and what
          # pos3ql advertises) so text columns decode to str, not raw bytes.
          POSTGRES_INITDB_ARGS: "--lc-collate=C --lc-ctype=C --encoding=UTF8"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client and Python
        run: sudo apt-get update && sudo apt-get install -y postgresql-client python3-venv

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Differential conformance (corpora + fuzzer vs real PostgreSQL)
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: postgres
          P3_PORT: "15599"
          # Replay the whole vendored sqllogictest corpus (~11k blocks) across
          # the three slt shards; SLT_LIMIT is the per-file block cap (all).
          SLT_LIMIT: "50000"
          SLT_SHARD_TOTAL: "3"
          SLT_SHARD_INDEX: ${{ matrix.slt_index }}
          RUN_SLT: ${{ matrix.run_slt }}
          RUN_FUZZ: ${{ matrix.run_fuzz }}
          # The fuzzer runs alone on its own shard, so it keeps the full
          # deterministic sweep. Ignored on the slt shards (RUN_FUZZ=0).
          FUZZ_COUNT: "10000"
          FUZZ_SEED: "1"
          # Ratchet budget: allowed fuzz divergences before failing (see BUGS.md
          # B-039). A ceiling, not an exact target — the residual divergences are
          # PostgreSQL-implementation-specific (unspecified within-row operand
          # order, plan-dependent projection placement). Ratchet toward zero.
          FUZZ_BUDGET: "31"
        run: bash tests/external/ci_diff.sh
