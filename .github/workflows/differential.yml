name: Differential

# Runs the SQL corpora and the generative fuzzer against a REAL PostgreSQL 18
# and against pos3ql, and diffs them. This is the coverage that the fast
# unit-test CI (ci.yml) cannot give: tens of thousands of vendored
# sqllogictest blocks plus thousands of generated statements, all validated
# against PostgreSQL as the oracle.

on:
  push:
    branches: [main]
  pull_request:

# One run per ref: a new push cancels the previous, still-running run, and a
# feature branch runs once (via pull_request) instead of twice.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  differential:
    runs-on: ubuntu-latest
    # Hard ceiling on every CI job: 15 minutes. Guarantees a pathological query
    # can never wedge CI, even if a per-statement guard is missing on one
    # engine. The differential workload (SLT_LIMIT + FUZZ_COUNT below) is sized
    # to finish comfortably under this cap.
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          # Match pos3ql: C/byte collation so ordering/min/max agree, and UTF8
          # server encoding (vanilla PostgreSQL's real-world default, and what
          # pos3ql advertises) so text columns decode to str, not raw bytes.
          POSTGRES_INITDB_ARGS: "--lc-collate=C --lc-ctype=C --encoding=UTF8"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client and Python
        run: sudo apt-get update && sudo apt-get install -y postgresql-client python3-venv

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Differential conformance (corpora + fuzzer vs real PostgreSQL)
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: postgres
          P3_PORT: "15599"
          # Replay the whole vendored sqllogictest corpus (~11k blocks) — the
          # highest-value coverage, kept full under the 15-minute job cap.
          SLT_LIMIT: "50000"
          # Generative fuzzer: a deterministic prefix of the seed-1 sequence.
          # Sized so the whole differential job (build + corpus + SLT + fuzzer)
          # finishes under the 15-minute cap. The count is the sole time lever
          # here (SLT is fixed-cost); the fuzzer's known divergences appear in
          # the early prefix, and the FUZZ_BUDGET gate is a ceiling, so a shorter
          # run can only lower the divergence count, never fail spuriously. To
          # restore the full 10k-statement sweep under the cap, shard this job.
          FUZZ_COUNT: "4000"
          FUZZ_SEED: "1"
          # Ratchet budget: allowed fuzz divergences before failing (see BUGS.md
          # B-039). A ceiling, not an exact target — the residual divergences are
          # PostgreSQL-implementation-specific (unspecified within-row operand
          # order, plan-dependent projection placement). Kept at the count=10000
          # ceiling so the shorter run stays comfortably within it; ratchet down.
          FUZZ_BUDGET: "31"
        run: bash tests/external/ci_diff.sh
